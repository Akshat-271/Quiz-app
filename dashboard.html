<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Quizzy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">QUIZ<span>ZY</span></a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="dash">

    <div class="dash-top">
      <h1>Hey, <span id="hello-name">there</span> 👋</h1>
      <button class="btn btn-yellow" id="new-quiz-btn">+ New Quiz</button>
    </div>

    <div class="stats">
      <div class="card stat yellow">
        <p class="stat-num" id="stat-quizzes">0</p>
        <p class="stat-lbl">Quizzes Created</p>
      </div>
      <div class="card stat cyan">
        <p class="stat-num" id="stat-questions">0</p>
        <p class="stat-lbl">Total Questions</p>
      </div>
    </div>

    <div class="card limit-bar">
      <span>Quiz Slots</span>
      <div class="limit-track">
        <div class="limit-fill" id="limit-fill" style="width: 0%"></div>
      </div>
      <span class="limit-count" id="limit-count">0 / 5</span>
    </div>

    <h2 style="font-size: 1rem; font-weight: 700; margin-bottom: 14px;">Your Quizzes</h2>
    <div class="quiz-grid" id="quiz-grid"></div>

  </div>

  <div id="toast"></div>
  <script src="script.js"></script>
  <script> initDashboard(); </script>
</body>
</html>
